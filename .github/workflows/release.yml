name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''

jobs:
  create-release:
    name: Create Git Tag & GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          # Get the latest semver tag; default to v0.0.0 if none exists
          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: $LATEST"

          # Strip leading 'v' and split
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT"
          echo "next_version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.next_version }}" \
            -m "Release ${{ steps.version.outputs.next_version }}"
          git push origin "${{ steps.version.outputs.next_version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="${{ github.event.inputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ steps.version.outputs.next_version }}"
          fi
          gh release create "${{ steps.version.outputs.next_version }}" \
            --title "Release ${{ steps.version.outputs.next_version }}" \
            --notes "$NOTES"
